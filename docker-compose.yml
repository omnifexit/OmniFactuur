services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
    environment:
      # Coolify koppelt het domein aan containerpoort 8080
      - SERVICE_URL_OMNIFACTUUR_8080

      # Applicatie
      - APP_NAME=OmniFactuur
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${SERVICE_BASE64_32_APPKEY}

      # Openbare URL
      - APP_URL=${SERVICE_URL_OMNIFACTUUR_8080}
      - ASSET_URL=${SERVICE_URL_OMNIFACTUUR_8080}

      # Taal en tijdzone
      - APP_TIMEZONE=Europe/Amsterdam
      - TIMEZONE=Europe/Amsterdam
      - APP_LOCALE=nl

      # Reverse proxy
      - TRUSTED_PROXIES=*

      # Sessies
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=240
      - SESSION_ENCRYPT=false
      - SESSION_PATH=/
      - SESSION_DOMAIN=${SERVICE_FQDN_OMNIFACTUUR_8080}
      - SESSION_SAME_SITE=lax
      - SESSION_SECURE_COOKIE=false

      # Laravel Sanctum
      - SANCTUM_STATEFUL_DOMAINS=${SERVICE_FQDN_OMNIFACTUUR_8080}

      # PostgreSQL
      - DB_CONNECTION=pgsql
      - DB_HOST=database
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-omnifactuur}
      - DB_USERNAME=${DB_USERNAME:-omnifactuur}
      - DB_PASSWORD=${SERVICE_PASSWORD_64_DATABASE}
      - DB_PASSWORD_FILE=

      - CACHE_STORE=file
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=240
      - QUEUE_CONNECTION=sync
      - AUTORUN_ENABLED=true
      - AUTORUN_LARAVEL_MIGRATION=false
      - AUTORUN_LARAVEL_OPTIMIZE=false
      - PHP_OPCACHE_ENABLE=1
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-512M}
      - PHP_UPLOAD_MAX_FILE_SIZE=${PHP_UPLOAD_MAX_FILE_SIZE:-64M}
      - PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-64M}
    volumes:
      - omnifactuur_storage:/var/www/html/storage
      - omnifactuur_modules:/var/www/html/Modules
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_DATABASE:-omnifactuur}
      - POSTGRES_USER=${DB_USERNAME:-omnifactuur}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_64_DATABASE}
    volumes:
      - omnifactuur_postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -h 127.0.0.1 -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  omnifactuur_storage:
  omnifactuur_modules:
  omnifactuur_postgres:
