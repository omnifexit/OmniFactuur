services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      # Creates a Coolify domain and routes it to the image's internal port 8080.
      - SERVICE_URL_OMNIFACTUUR_8080

      - APP_NAME=${APP_NAME:-OmniFactuur}
      - APP_ENV=production
      - APP_DEBUG=false
      # A persistent random 32-character key generated by Coolify.
      - APP_KEY=${SERVICE_BASE64_32_APPKEY}
      - APP_URL=${SERVICE_URL_OMNIFACTUUR_8080}
      - ASSET_URL=${SERVICE_URL_OMNIFACTUUR_8080}
      - APP_TIMEZONE=${APP_TIMEZONE:-Europe/Amsterdam}
      - TIMEZONE=${APP_TIMEZONE:-Europe/Amsterdam}
      - APP_LOCALE=${APP_LOCALE:-nl}
      - TRUSTED_PROXIES=*
      - SESSION_DOMAIN=${SERVICE_FQDN_OMNIFACTUUR}
      - SANCTUM_STATEFUL_DOMAINS=${SERVICE_FQDN_OMNIFACTUUR}

      - DB_CONNECTION=mariadb
      - DB_HOST=database
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-omnifactuur}
      - DB_USERNAME=${DB_USERNAME:-omnifactuur}
      - DB_PASSWORD=${SERVICE_PASSWORD_64_DATABASE}
      - DB_PASSWORD_FILE=

      - CACHE_STORE=file
      - SESSION_DRIVER=file
      - SESSION_LIFETIME=240
      - QUEUE_CONNECTION=sync

      - AUTORUN_ENABLED=true
      - AUTORUN_LARAVEL_MIGRATION=false
      - AUTORUN_LARAVEL_OPTIMIZE=false
      - PHP_OPCACHE_ENABLE=1
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-512M}
      - PHP_UPLOAD_MAX_FILE_SIZE=${PHP_UPLOAD_MAX_FILE_SIZE:-64M}
      - PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-64M}
    volumes:
      - omnifactuur_storage:/var/www/html/storage
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      - MARIADB_DATABASE=${DB_DATABASE:-omnifactuur}
      - MARIADB_USER=${DB_USERNAME:-omnifactuur}
      - MARIADB_PASSWORD=${SERVICE_PASSWORD_64_DATABASE}
      - MARIADB_ROOT_PASSWORD=${SERVICE_PASSWORD_64_DATABASEROOT}
    volumes:
      - omnifactuur_database:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mariadb-admin ping -h 127.0.0.1 -u root -p$${MARIADB_ROOT_PASSWORD} --silent
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  omnifactuur_storage:
  omnifactuur_database:
